# Strict analysis for MindBridge (Phase 0 requirement: flutter_lints strict).
#
# Base: flutter_lints. On top: strict language modes and additional rules
# that keep null-safety and typing rigorous, as required by CLAUDE.md.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat missing awaits and dead code as errors, not hints.
    unawaited_futures: error
    dead_code: error

linter:
  rules:
    # Style / consistency
    - prefer_single_quotes
    - prefer_final_locals
    - prefer_final_in_for_each
    - unnecessary_lambdas
    - directives_ordering
    - sort_pub_dependencies

    # Correctness
    - unawaited_futures
    - avoid_dynamic_calls
    - avoid_slow_async_io
    - avoid_type_to_string
    - cancel_subscriptions
    - close_sinks
    - only_throw_errors
    - test_types_in_equals
    - throw_in_finally

    # API hygiene
    - always_declare_return_types
    - type_annotate_public_apis
    - avoid_returning_this
    - use_setters_to_change_properties
